version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FloraPetFriend — Full Stack Docker Compose
# Services: Next.js · Supabase · Ollama · MinIO · n8n · NocoDB
# ─────────────────────────────────────────────────────────────────────────────

networks:
  florapetfriend:
    driver: bridge

volumes:
  supabase_db:
  minio_data:
  ollama_data:
  n8n_data:
  nocodb_data:

services:

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fpf_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llava:13b
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      NEXT_PUBLIC_APP_URL: https://florapetfriend.site
    depends_on:
      - ollama
      - minio
    networks:
      - florapetfriend

  # ── Supabase (self-hosted via Kong gateway) ──────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.1.0.147
    container_name: fpf_supabase_db
    restart: unless-stopped
    volumes:
      - supabase_db:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    networks:
      - florapetfriend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-kong:
    image: kong:2.8.1
    container_name: fpf_supabase_kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml
    depends_on:
      - supabase-db
    networks:
      - florapetfriend

  # ── Ollama (LLaVA + Llama3.2) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: fpf_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - florapetfriend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama model puller (runs once) ───────────────────────────────────────────
  ollama-puller:
    image: ollama/ollama:latest
    container_name: fpf_ollama_puller
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 10 &&
        ollama pull llava:13b &&
        ollama pull llama3.2
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    networks:
      - florapetfriend

  # ── MinIO (S3-compatible storage) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fpf_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    networks:
      - florapetfriend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket initializer ──────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: fpf_minio_init
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/pet-photos &&
        mc mb --ignore-existing local/virtual-pets &&
        mc anonymous set public local/pet-photos &&
        mc anonymous set public local/virtual-pets
      "
    networks:
      - florapetfriend

  # ── n8n (Automation) ─────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: fpf_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/workflows:/home/node/.n8n/workflows
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.florapetfriend.site}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.florapetfriend.site
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: supabase-db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    depends_on:
      - supabase-db
    networks:
      - florapetfriend

  # ── NocoDB (Admin Panel) ──────────────────────────────────────────────────────
  nocodb:
    image: nocodb/nocodb:latest
    container_name: fpf_nocodb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data
    environment:
      NC_DB: pg://supabase-db:5432?u=postgres&p=${POSTGRES_PASSWORD}&d=postgres
      NC_AUTH_JWT_SECRET: ${NC_JWT_SECRET}
    depends_on:
      - supabase-db
    networks:
      - florapetfriend
